<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">
  <!-- Background subtle gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef5fa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#d6eaf2" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="organGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#f4a0a0"/>
      <stop offset="100%" stop-color="#e87878"/>
    </linearGradient>
    <linearGradient id="colonGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b8a8"/>
      <stop offset="100%" stop-color="#e8a090"/>
    </linearGradient>
    <linearGradient id="appendixGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e04040"/>
      <stop offset="100%" stop-color="#c02020"/>
    </linearGradient>
    <radialGradient id="pulseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e04040" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#e04040" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e04040" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#334155" flood-opacity="0.08"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Torso silhouette (subtle) -->
  <path d="M120 40 Q200 20 280 40 Q310 60 320 120 Q325 180 315 240 Q310 320 300 400 Q280 460 200 480 Q120 460 100 400 Q90 320 85 240 Q75 180 80 120 Q90 60 120 40Z"
        fill="#e8f0f6" stroke="#c8d8e4" stroke-width="1" opacity="0.5"/>

  <!-- Large intestine / Colon -->
  <g filter="url(#softShadow)">
    <!-- Ascending colon (right side of body = left of image) -->
    <path d="M140 380 Q135 340 138 300 Q140 260 145 230 Q150 200 160 180"
          stroke="url(#colonGrad)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.85"/>
    <!-- Transverse colon -->
    <path d="M160 180 Q180 165 200 160 Q230 158 260 165"
          stroke="url(#colonGrad)" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.85"/>
    <!-- Descending colon -->
    <path d="M260 165 Q265 200 262 240 Q258 280 255 320 Q250 360 248 380"
          stroke="url(#colonGrad)" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.85"/>
  </g>

  <!-- Small intestine area -->
  <g opacity="0.6">
    <path d="M165 250 Q185 240 205 250 Q225 260 210 275 Q195 285 175 275 Q160 265 165 250Z" fill="#f0c0b0" stroke="#e0a898" stroke-width="0.5"/>
    <path d="M175 280 Q200 270 220 280 Q235 295 215 305 Q195 310 180 300 Q168 290 175 280Z" fill="#f0c0b0" stroke="#e0a898" stroke-width="0.5"/>
    <path d="M180 310 Q200 300 225 310 Q240 325 220 335 Q200 340 185 330 Q172 320 180 310Z" fill="#f0c0b0" stroke="#e0a898" stroke-width="0.5"/>
    <path d="M170 335 Q195 328 215 338 Q228 350 210 358 Q190 362 175 352 Q163 343 170 335Z" fill="#f0c0b0" stroke="#e0a898" stroke-width="0.5"/>
  </g>

  <!-- Cecum (where appendix connects) -->
  <ellipse cx="145" cy="390" rx="22" ry="28" fill="url(#colonGrad)" opacity="0.9" filter="url(#softShadow)"/>

  <!-- APPENDIX — highlighted with pulse -->
  <!-- Pulse glow animation circle -->
  <circle cx="128" cy="420" r="30" fill="url(#pulseGlow)">
    <animate attributeName="r" values="25;35;25" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Appendix shape -->
  <path d="M140 400 Q135 410 128 425 Q120 440 115 448 Q110 453 108 455"
        stroke="url(#appendixGrad)" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Appendix indicator dot -->
  <circle cx="108" cy="455" r="5" fill="#e04040">
    <animate attributeName="r" values="4;6;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Label line + text -->
  <line x1="108" y1="455" x2="60" y2="465" stroke="#c02020" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.7"/>
  <text x="55" y="463" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#c02020">Appendice</text>
  <text x="55" y="478" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="400" fill="#94a3b8">Zone d'inflammation</text>

  <!-- Cecum label -->
  <line x1="145" y1="390" x2="200" y2="395" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="205" y="399" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" fill="#94a3b8">Cæcum</text>

  <!-- Colon label -->
  <text x="200" y="148" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="500" fill="#94a3b8">Côlon transverse</text>
</svg>
