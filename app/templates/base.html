<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PediAppend — AI-Powered Pediatric Appendicitis Diagnosis{% endblock %}</title>
    <meta name="description" content="Advanced clinical decision support system for pediatric appendicitis diagnosis using machine learning.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- ═══ Navbar ═══ -->
    <header class="navbar" id="navbar">
        <div class="navbar-inner">
            <a href="{{ url_for('home') }}" class="logo">
                <div class="logo-icon">
                    ♥
                    <span class="pulse-dot"></span>
                </div>
                <div class="logo-text">
                    <span class="name">PediAppend</span>
                    <span class="sub">AI Clinical Support</span>
                </div>
            </a>

            <nav class="nav-links">
                <a href="{{ url_for('home') }}">Features</a>
                <a href="{{ url_for('diagnosis') }}">Methodology</a>
                <a href="{{ url_for('history') }}">History</a>
                <a href="{{ url_for('diagnosis') }}" class="btn btn-primary">
                    🩺 Start Diagnosis →
                </a>
            </nav>
        </div>
    </header>

    <!-- ═══ Flash Messages ═══ -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-messages">
        {% for category, message in messages %}
        <div class="flash-msg {{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- ═══ Main Content ═══ -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
