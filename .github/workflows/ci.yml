name: CI — Pediatric Appendicitis App

on:
  push:
    branches: [main]
    tags:
      - "v*"          # déclenché sur v1.0.0, v1.2.3, etc.
  pull_request:
    branches: [main]

jobs:

  # ──────────────────────────────────────────────────────────────
  # JOB 1 — Version + Installation + imports
  # ──────────────────────────────────────────────────────────────
  imports:
    name: "Dépendances & imports"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      # Lire la version depuis src/__init__.py et l'exposer
      # pour tous les jobs suivants via $GITHUB_ENV
      - name: Lire la version
        run: |
          echo "APP_VERSION=$(python -c 'import src; print(src.__version__)')" >> $GITHUB_ENV

      - name: Afficher la version
        run: echo "▶ Version en cours de test ${{ env.APP_VERSION }}"

      - name: Import src.data_processing
        run: |
          python -c "from src.data_processing import load_data, optimize_memory, clean_data, preprocess_data"

      - name: Import src.train_model
        run: |
          python -c "from src.train_model import get_models, train_and_evaluate, select_best_model"

      - name: Import src.evaluate_model
        run: |
          python -c "import src.evaluate_model"

      - name: Import app Flask
        run: python -c "import app"
        working-directory: app

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — Tests unitaires
  # ──────────────────────────────────────────────────────────────
  tests:
    name: "Tests unitaires"
    runs-on: ubuntu-latest
    needs: imports

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer pytest
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — Pipeline données
  # ──────────────────────────────────────────────────────────────
  data-pipeline:
    name: "Pipeline données"
    runs-on: ubuntu-latest
    needs: imports

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Téléchargement UCI + nettoyage + prétraitement
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, ".")
          from src.data_processing import load_data, optimize_memory, clean_data, preprocess_data

          df = load_data()
          assert len(df) > 0, "Dataset vide"
          print(f"✓ Chargement : {df.shape}")

          df = optimize_memory(df)
          df = clean_data(df)
          assert df.isnull().sum().sum() == 0, "NaN résiduels après nettoyage"
          print(f"✓ Nettoyage  : {df.shape}, 0 NaN")

          X_train, X_test, y_train, y_test, scaler, features = preprocess_data(df)
          assert X_train.shape[0] > 0
          assert X_test.shape[0]  > 0
          assert len(features)    > 0
          print(f"✓ Prétraitement : train={X_train.shape}, test={X_test.shape}")
          print(f"✓ {len(features)} features : {features[:5]}...")
          EOF

  # ──────────────────────────────────────────────────────────────
  # JOB 4 — Routes Flask
  # ──────────────────────────────────────────────────────────────
  flask-routes:
    name: "Routes Flask"
    runs-on: ubuntu-latest
    needs: imports

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Test routes Flask
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, "app")
          import app as flask_app

          flask_app.app.config["TESTING"] = True
          client = flask_app.app.test_client()

          routes = ["/", "/history", "/login", "/register", "/admin"]
          for route in routes:
              r = client.get(route)
              assert r.status_code in (200, 302), f"GET {route} → {r.status_code}"
              print(f"✓ GET {route:<12} → {r.status_code}")
          EOF

  # ──────────────────────────────────────────────────────────────
  # JOB 5 — Artefacts ML
  # ──────────────────────────────────────────────────────────────
  check-models:
    name: "Artefacts ML"
    runs-on: ubuntu-latest
    needs: imports

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Charger et vérifier les artefacts
        run: |
          python - <<'EOF'
          import joblib, json, os

          models_dir = "models"
          required   = ["best_model.pkl", "scaler.pkl", "feature_names.pkl", "metrics.json"]

          for f in required:
              path = os.path.join(models_dir, f)
              assert os.path.exists(path), f"Fichier manquant : {path}"
              print(f"✓ {f} présent")

          model    = joblib.load(os.path.join(models_dir, "best_model.pkl"))
          scaler   = joblib.load(os.path.join(models_dir, "scaler.pkl"))
          features = joblib.load(os.path.join(models_dir, "feature_names.pkl"))

          assert hasattr(model,  "predict"),   "best_model.pkl invalide"
          assert hasattr(scaler, "transform"), "scaler.pkl invalide"
          assert isinstance(features, list) and len(features) > 0

          with open(os.path.join(models_dir, "metrics.json")) as f:
              metrics = json.load(f)
          best   = metrics["best_model"]
          recall = metrics["models"][best]["recall"]
          assert recall >= 0.85, f"Recall trop bas : {recall:.4f} < 0.85"

          print(f"✓ Modèle   : {best}")
          print(f"✓ Features : {len(features)}")
          print(f"✓ Recall   : {recall:.4f}  (seuil ≥ 0.85)")
          EOF

  # ──────────────────────────────────────────────────────────────
  # JOB 6 — Release automatique (sur tag v* uniquement)
  # ──────────────────────────────────────────────────────────────
  release:
    name: "Créer la Release GitHub"
    runs-on: ubuntu-latest
    needs: [tests, data-pipeline, flask-routes, check-models]
    # Ne tourne QUE si on a pushé un tag genre v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v3

      - name: Lire la version
        run: |
          echo "APP_VERSION=$(python -c 'import src; print(src.__version__)')" >> $GITHUB_ENV

      - name: Créer la Release
        uses: softprops/action-gh-release@v1
        with:
          name: "v${{ env.APP_VERSION }}"
          body: |
            ## Pediatric Appendicitis App — v${{ env.APP_VERSION }}

            ✅ Tous les tests CI passés avant cette release :
            - Imports Python
            - Tests unitaires pytest
            - Pipeline données (UCI → clean → preprocess)
            - Routes Flask
            - Artefacts ML (Recall ≥ 0.85)
          files: |
            models/metrics.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}